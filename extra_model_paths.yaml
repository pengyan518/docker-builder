# Matches runpod-workers/worker-comfyui: models on Network Volume at /runpod-volume/models/...
# When using scripts/start_with_runpod_volume.sh, /comfyui/models is symlinked to this path;
# these entries remain valid as secondary paths (same physical files).
runpod_worker_comfy:
  base_path: /runpod-volume
  checkpoints: models/checkpoints/
  clip: models/clip/
  clip_vision: models/clip_vision/
  configs: models/configs/
  controlnet: models/controlnet/
  embeddings: models/embeddings/
  loras: models/loras/
  upscale_models: models/upscale_models/
  vae: models/vae/
  unet: models/unet/
